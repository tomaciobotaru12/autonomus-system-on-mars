<svg viewBox="0 0 780 740" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <rect width="780" height="740" fill="#0d1117"/>

  <text x="390" y="32" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Decision Engine — Flow Diagram</text>

  <!-- START -->
  <ellipse cx="390" cy="65" rx="100" ry="22" fill="#1f2937" stroke="#4b5563"/>
  <text x="390" y="70" text-anchor="middle" fill="#9ca3af" font-size="11">Storm Detected</text>

  <line x1="390" y1="87" x2="390" y2="112" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,115 385,107 395,107" fill="#4b5563"/>

  <!-- HARD RULES BOX -->
  <rect x="240" y="115" width="300" height="44" rx="6" fill="#2d1b1b" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="390" y="134" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">Layer 1 — Hard Rules</text>
  <text x="390" y="150" text-anchor="middle" fill="#9ca3af" font-size="9">battery · compute · sensors · score ≥90</text>

  <line x1="390" y1="159" x2="390" y2="184" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,187 385,179 395,179" fill="#4b5563"/>

  <!-- Hard rule diamond -->
  <polygon points="390,187 490,220 390,253 290,220" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="390" y="215" text-anchor="middle" fill="#fca5a5" font-size="10">Any hard</text>
  <text x="390" y="229" text-anchor="middle" fill="#fca5a5" font-size="10">rule fires?</text>

  <!-- YES branch right -->
  <line x1="490" y1="220" x2="590" y2="220" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="593,220 585,215 585,225" fill="#ef4444"/>
  <text x="535" y="213" text-anchor="middle" fill="#ef4444" font-size="9">YES</text>

  <rect x="594" y="200" width="140" height="40" rx="6" fill="#3a1a1a" stroke="#dc2626"/>
  <text x="664" y="217" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">LAND_IMMEDIATE</text>
  <text x="664" y="231" text-anchor="middle" fill="#9ca3af" font-size="9">or SAFE_MODE</text>

  <!-- NO branch down -->
  <line x1="390" y1="253" x2="390" y2="278" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,281 385,273 395,273" fill="#4b5563"/>
  <text x="405" y="270" fill="#6b7280" font-size="9">NO</text>

  <!-- Confidence adjustment -->
  <rect x="240" y="281" width="300" height="44" rx="6" fill="#1a1f2e" stroke="#374151"/>
  <text x="390" y="300" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="bold">Apply Confidence Adjustment</text>
  <text x="390" y="315" text-anchor="middle" fill="#9ca3af" font-size="9">confidence &lt;40% → +20 · &lt;60% → +10 · else +0</text>

  <line x1="390" y1="325" x2="390" y2="350" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,353 385,345 395,345" fill="#4b5563"/>

  <!-- Risk delta adjustment -->
  <rect x="240" y="353" width="300" height="44" rx="6" fill="#1a1f2e" stroke="#374151"/>
  <text x="390" y="372" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="bold">Apply Risk Delta Adjustment</text>
  <text x="390" y="387" text-anchor="middle" fill="#9ca3af" font-size="9">RAPIDLY_INCREASING → +10 · INCREASING → +5</text>

  <line x1="390" y1="397" x2="390" y2="422" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,425 385,417 395,417" fill="#4b5563"/>

  <!-- Adjusted risk diamond -->
  <polygon points="390,425 510,465 390,505 270,465" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="458" text-anchor="middle" fill="#e6edf3" font-size="10">Adjusted</text>
  <text x="390" y="473" text-anchor="middle" fill="#e6edf3" font-size="10">risk score?</text>

  <!-- 0-30 branch LEFT -->
  <line x1="270" y1="465" x2="110" y2="465" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="107,465 115,460 115,470" fill="#4b5563"/>
  <text x="190" y="458" text-anchor="middle" fill="#6b7280" font-size="9">0–30, stable</text>

  <rect x="20" y="445" width="90" height="40" rx="6" fill="#1e3a5f" stroke="#2563eb"/>
  <text x="65" y="462" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">CONTINUE</text>
  <text x="65" y="476" text-anchor="middle" fill="#6b7280" font-size="8">30s interval</text>

  <!-- 30-50 branch -->
  <line x1="390" y1="505" x2="390" y2="530" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,533 385,525 395,525" fill="#4b5563"/>

  <!-- Reroute available? -->
  <polygon points="390,533 480,558 390,583 300,558" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="551" text-anchor="middle" fill="#e6edf3" font-size="9">30–50:</text>
  <text x="390" y="566" text-anchor="middle" fill="#e6edf3" font-size="9">reroute path?</text>

  <!-- YES reroute -->
  <line x1="480" y1="558" x2="600" y2="558" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="603,558 595,553 595,563" fill="#4b5563"/>
  <text x="538" y="551" fill="#6b7280" font-size="9">exists</text>

  <rect x="604" y="538" width="90" height="40" rx="6" fill="#1e3a5f" stroke="#2563eb"/>
  <text x="649" y="555" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">REROUTE</text>
  <text x="649" y="569" text-anchor="middle" fill="#6b7280" font-size="8">15s interval</text>

  <!-- NO reroute / 50-75 -->
  <line x1="390" y1="583" x2="390" y2="608" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,611 385,603 395,603" fill="#4b5563"/>
  <text x="410" y="600" fill="#6b7280" font-size="9">50–75 or none</text>

  <!-- Landing zone? -->
  <polygon points="390,611 490,641 390,671 290,641" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="390" y="634" text-anchor="middle" fill="#e6edf3" font-size="9">Landing zone</text>
  <text x="390" y="649" text-anchor="middle" fill="#e6edf3" font-size="9">reachable?</text>

  <!-- YES landing zone -->
  <line x1="290" y1="641" x2="150" y2="641" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="147,641 155,636 155,646" fill="#4b5563"/>
  <text x="220" y="634" fill="#6b7280" font-size="9">yes</text>

  <rect x="60" y="621" width="90" height="40" rx="6" fill="#1a3a2a" stroke="#16a34a"/>
  <text x="105" y="638" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">LAND_SAFE</text>
  <text x="105" y="652" text-anchor="middle" fill="#6b7280" font-size="8">10s interval</text>

  <!-- NO landing zone / 75+ -->
  <line x1="490" y1="641" x2="604" y2="641" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="607,641 599,636 599,646" fill="#ef4444"/>
  <text x="548" y="634" fill="#ef4444" font-size="9">no / 75+</text>

  <rect x="608" y="621" width="140" height="40" rx="6" fill="#3a1a1a" stroke="#dc2626"/>
  <text x="678" y="638" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">LAND_IMMEDIATE</text>
  <text x="678" y="652" text-anchor="middle" fill="#9ca3af" font-size="9">commit, no re-eval</text>

  <!-- Log entry note -->
  <rect x="200" y="700" width="380" height="28" rx="4" fill="#111827" stroke="#374151" stroke-dasharray="3"/>
  <text x="390" y="719" text-anchor="middle" fill="#6b7280" font-size="9">Every decision → black box log + telemetry transmission</text>

</svg>
