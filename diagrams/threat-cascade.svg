<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <rect width="780" height="520" fill="#0d1117"/>

  <text x="390" y="32" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Threat Cascade — Why Early Action Is Critical</text>
  <text x="390" y="52" text-anchor="middle" fill="#6b7280" font-size="10">Each threat amplifies the others. The window to act closes faster than any single threat suggests.</text>

  <!-- TRIGGER -->
  <rect x="290" y="70" width="200" height="44" rx="8" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
  <text x="390" y="90" text-anchor="middle" fill="#9ca3af" font-size="11">Dust Storm Detected</text>
  <text x="390" y="106" text-anchor="middle" fill="#6b7280" font-size="9">12 minutes ahead · 14-min Earth delay</text>

  <!-- Arrow down center -->
  <line x1="390" y1="114" x2="390" y2="144" stroke="#4b5563" stroke-width="1.5"/>
  <polygon points="390,147 385,139 395,139" fill="#4b5563"/>

  <!-- THREE THREAT BOXES in a row -->

  <!-- Threat 1 -->
  <rect x="50" y="147" width="200" height="64" rx="8" fill="#1a1a2e" stroke="#3b4fd4" stroke-width="1.5"/>
  <text x="150" y="168" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="bold">THREAT 1</text>
  <text x="150" y="184" text-anchor="middle" fill="#c7d2fe" font-size="10">Solar Power Loss</text>
  <text x="150" y="200" text-anchor="middle" fill="#6b7280" font-size="9">Dust coats solar panels</text>

  <!-- Threat 2 -->
  <rect x="290" y="147" width="200" height="64" rx="8" fill="#1a2a1a" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="168" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">THREAT 2</text>
  <text x="390" y="184" text-anchor="middle" fill="#bbf7d0" font-size="10">Sensor Blindness</text>
  <text x="390" y="200" text-anchor="middle" fill="#6b7280" font-size="9">Optical sensors coat first</text>

  <!-- Threat 3 -->
  <rect x="530" y="147" width="200" height="64" rx="8" fill="#2a1a1a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="630" y="168" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">THREAT 3</text>
  <text x="630" y="184" text-anchor="middle" fill="#fecaca" font-size="10">Electrostatic Damage</text>
  <text x="630" y="200" text-anchor="middle" fill="#6b7280" font-size="9">Charged particles on electronics</text>

  <!-- Lines from trigger to threats -->
  <line x1="340" y1="114" x2="150" y2="147" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="390" y1="114" x2="390" y2="147" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="440" y1="114" x2="630" y2="147" stroke="#4b5563" stroke-width="1.5"/>

  <!-- CASCADE ARROWS between threats -->
  <!-- T1 → T2 -->
  <line x1="250" y1="179" x2="290" y2="179" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="293,179 285,174 285,184" fill="#f59e0b"/>
  <text x="270" y="172" text-anchor="middle" fill="#f59e0b" font-size="8">amplifies</text>

  <!-- T2 → T3 -->
  <line x1="490" y1="179" x2="530" y2="179" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="533,179 525,174 525,184" fill="#f59e0b"/>
  <text x="510" y="172" text-anchor="middle" fill="#f59e0b" font-size="8">amplifies</text>

  <!-- T3 → T1 (curved back) -->
  <path d="M 630 211 Q 390 270 150 211" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="150,211 158,206 155,216" fill="#f59e0b"/>
  <text x="390" y="268" text-anchor="middle" fill="#f59e0b" font-size="9">damage accelerates power loss</text>

  <!-- CONSEQUENCES ROW -->
  <text x="150" y="300" text-anchor="middle" fill="#6b7280" font-size="9">↓</text>
  <text x="390" y="300" text-anchor="middle" fill="#6b7280" font-size="9">↓</text>
  <text x="630" y="300" text-anchor="middle" fill="#6b7280" font-size="9">↓</text>

  <rect x="60" y="308" width="180" height="52" rx="6" fill="#0f1623" stroke="#374151"/>
  <text x="150" y="328" text-anchor="middle" fill="#9ca3af" font-size="9">Power below threshold</text>
  <text x="150" y="342" text-anchor="middle" fill="#9ca3af" font-size="9">→ flight computers fail</text>
  <text x="150" y="356" text-anchor="middle" fill="#ef4444" font-size="9">→ cannot make decisions</text>

  <rect x="300" y="308" width="180" height="52" rx="6" fill="#0f1623" stroke="#374151"/>
  <text x="390" y="328" text-anchor="middle" fill="#9ca3af" font-size="9">Navigation blind</text>
  <text x="390" y="342" text-anchor="middle" fill="#9ca3af" font-size="9">→ cannot assess storm</text>
  <text x="390" y="356" text-anchor="middle" fill="#ef4444" font-size="9">→ cannot reroute safely</text>

  <rect x="540" y="308" width="180" height="52" rx="6" fill="#0f1623" stroke="#374151"/>
  <text x="630" y="328" text-anchor="middle" fill="#9ca3af" font-size="9">Electronics damaged</text>
  <text x="630" y="342" text-anchor="middle" fill="#9ca3af" font-size="9">→ sensors malfunction</text>
  <text x="630" y="356" text-anchor="middle" fill="#ef4444" font-size="9">→ permanent damage</text>

  <!-- COMBINED CONSEQUENCE -->
  <line x1="150" y1="360" x2="150" y2="392" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="390" y1="360" x2="390" y2="392" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="630" y1="360" x2="630" y2="392" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="150" y1="392" x2="630" y2="392" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="390" y1="392" x2="390" y2="412" stroke="#ef4444" stroke-width="2"/>
  <polygon points="390,415 385,407 395,407" fill="#ef4444"/>

  <rect x="190" y="415" width="400" height="44" rx="8" fill="#2d1b1b" stroke="#dc2626" stroke-width="2"/>
  <text x="390" y="436" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">TOTAL FAILURE CASCADE</text>
  <text x="390" y="452" text-anchor="middle" fill="#9ca3af" font-size="9">Aircraft cannot navigate · cannot assess · cannot decide · cannot land safely</text>

  <!-- KEY INSIGHT BOX -->
  <rect x="80" y="472" width="620" height="36" rx="6" fill="#111827" stroke="#374151" stroke-dasharray="3"/>
  <text x="390" y="487" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">Key Insight: The decision window closes faster than any single threat implies.</text>
  <text x="390" y="501" text-anchor="middle" fill="#9ca3af" font-size="9">Act before the first threshold is crossed — not after. Waiting for confirmation is itself a failure mode.</text>

</svg>
