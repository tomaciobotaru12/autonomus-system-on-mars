<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace">

  <!-- Background -->
  <rect width="800" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">System Architecture — Data Flow</text>

  <!-- SENSOR LAYER -->
  <rect x="60" y="60" width="680" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">SENSOR LAYER</text>

  <!-- Sensor boxes -->
  <rect x="80" y="90" width="100" height="36" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="130" y="108" text-anchor="middle" fill="#60a5fa" font-size="10">Radar</text>
  <text x="130" y="120" text-anchor="middle" fill="#6b7280" font-size="9">density · distance</text>

  <rect x="200" y="90" width="100" height="36" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="250" y="108" text-anchor="middle" fill="#60a5fa" font-size="10">Optical</text>
  <text x="250" y="120" text-anchor="middle" fill="#6b7280" font-size="9">visibility · terrain</text>

  <rect x="320" y="90" width="120" height="36" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="380" y="108" text-anchor="middle" fill="#60a5fa" font-size="10">Power Monitor</text>
  <text x="380" y="120" text-anchor="middle" fill="#6b7280" font-size="9">solar · battery · rate</text>

  <rect x="460" y="90" width="100" height="36" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="510" y="108" text-anchor="middle" fill="#60a5fa" font-size="10">IMU</text>
  <text x="510" y="120" text-anchor="middle" fill="#6b7280" font-size="9">position · velocity</text>

  <rect x="580" y="90" width="120" height="36" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="640" y="108" text-anchor="middle" fill="#60a5fa" font-size="10">Barometric</text>
  <text x="640" y="120" text-anchor="middle" fill="#6b7280" font-size="9">pressure · delta</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="140" x2="400" y2="165" stroke="#4b5563" stroke-width="2"/>
  <polygon points="400,168 395,160 405,160" fill="#4b5563"/>
  <text x="500" y="157" fill="#6b7280" font-size="9">value + confidence + status</text>

  <!-- SENSOR FUSION LAYER -->
  <rect x="60" y="170" width="680" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="192" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">SENSOR FUSION LAYER</text>
  <text x="400" y="210" text-anchor="middle" fill="#9ca3af" font-size="10">Weighted combination of sensor inputs · Contradiction detection · Sensor health monitoring</text>
  <text x="400" y="228" text-anchor="middle" fill="#f59e0b" font-size="10">Output: storm_profile { density, distance, growth_rate, movement } + confidence_score</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="240" x2="400" y2="265" stroke="#4b5563" stroke-width="2"/>
  <polygon points="400,268 395,260 405,260" fill="#4b5563"/>
  <text x="460" y="258" fill="#6b7280" font-size="9">storm_profile + confidence_score</text>

  <!-- RISK SCORING ENGINE -->
  <rect x="60" y="270" width="680" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">RISK SCORING ENGINE</text>

  <rect x="80" y="300" width="140" height="36" rx="4" fill="#1a1f2e" stroke="#374151"/>
  <text x="150" y="316" text-anchor="middle" fill="#c084fc" font-size="9">Storm Density (0–25)</text>
  <text x="150" y="328" text-anchor="middle" fill="#6b7280" font-size="8">radar opacity vs baseline</text>

  <rect x="240" y="300" width="140" height="36" rx="4" fill="#1a1f2e" stroke="#374151"/>
  <text x="310" y="316" text-anchor="middle" fill="#c084fc" font-size="9">Power Vulnerability (0–25)</text>
  <text x="310" y="328" text-anchor="middle" fill="#6b7280" font-size="8">solar efficiency drop rate</text>

  <rect x="400" y="300" width="140" height="36" rx="4" fill="#1a1f2e" stroke="#374151"/>
  <text x="470" y="316" text-anchor="middle" fill="#c084fc" font-size="9">Time Pressure (0–25)</text>
  <text x="470" y="328" text-anchor="middle" fill="#6b7280" font-size="8">minutes to storm contact</text>

  <rect x="560" y="300" width="160" height="36" rx="4" fill="#1a1f2e" stroke="#374151"/>
  <text x="640" y="316" text-anchor="middle" fill="#c084fc" font-size="9">Uncertainty Penalty (0–25)</text>
  <text x="640" y="328" text-anchor="middle" fill="#6b7280" font-size="8">sensor confidence + state</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="350" x2="400" y2="375" stroke="#4b5563" stroke-width="2"/>
  <polygon points="400,378 395,370 405,370" fill="#4b5563"/>
  <text x="460" y="368" fill="#6b7280" font-size="9">risk_score (0–100) + risk_delta</text>

  <!-- DECISION ENGINE -->
  <rect x="60" y="380" width="680" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="402" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">DECISION ENGINE</text>

  <rect x="80" y="408" width="290" height="38" rx="4" fill="#2d1b1b" stroke="#7f1d1d"/>
  <text x="225" y="423" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="bold">Layer 1 — Hard Rules (override everything)</text>
  <text x="225" y="437" text-anchor="middle" fill="#9ca3af" font-size="8">battery &lt;15% · compute CRITICAL · radar+optical FAILED · score ≥90</text>

  <rect x="390" y="408" width="330" height="38" rx="4" fill="#1a2d1a" stroke="#14532d"/>
  <text x="555" y="423" text-anchor="middle" fill="#86efac" font-size="9" font-weight="bold">Layer 2 — Risk Threshold Rules</text>
  <text x="555" y="437" text-anchor="middle" fill="#9ca3af" font-size="8">0–30 CONTINUE · 30–50 REROUTE · 50–75 LAND_SAFE · 75+ LAND_IMMEDIATE</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="460" x2="400" y2="485" stroke="#4b5563" stroke-width="2"/>
  <polygon points="400,488 395,480 405,480" fill="#4b5563"/>
  <text x="450" y="478" fill="#6b7280" font-size="9">action + reason + log entry</text>

  <!-- ACTION EXECUTOR -->
  <rect x="60" y="490" width="680" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="512" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold">ACTION EXECUTOR</text>

  <!-- Action pills -->
  <rect x="80" y="522" width="90" height="16" rx="8" fill="#1e3a5f" stroke="#2563eb"/>
  <text x="125" y="534" text-anchor="middle" fill="#93c5fd" font-size="9">CONTINUE</text>

  <rect x="182" y="522" width="90" height="16" rx="8" fill="#1e3a5f" stroke="#2563eb"/>
  <text x="227" y="534" text-anchor="middle" fill="#93c5fd" font-size="9">REROUTE</text>

  <rect x="284" y="522" width="100" height="16" rx="8" fill="#1a3a2a" stroke="#16a34a"/>
  <text x="334" y="534" text-anchor="middle" fill="#86efac" font-size="9">LAND_SAFE</text>

  <rect x="396" y="522" width="130" height="16" rx="8" fill="#3a1a1a" stroke="#dc2626"/>
  <text x="461" y="534" text-anchor="middle" fill="#fca5a5" font-size="9">LAND_IMMEDIATE</text>

  <rect x="538" y="522" width="100" height="16" rx="8" fill="#3a1a3a" stroke="#9333ea"/>
  <text x="588" y="534" text-anchor="middle" fill="#d8b4fe" font-size="9">SAFE_MODE</text>

  <!-- Telemetry side box -->
  <rect x="60" y="560" width="320" height="40" rx="6" fill="#111827" stroke="#374151" stroke-dasharray="4"/>
  <text x="220" y="577" text-anchor="middle" fill="#9ca3af" font-size="10">Black Box — writes every evaluation, independent power</text>
  <text x="220" y="592" text-anchor="middle" fill="#6b7280" font-size="9">local storage first · telemetry transmission second</text>

  <rect x="420" y="560" width="320" height="40" rx="6" fill="#111827" stroke="#374151" stroke-dasharray="4"/>
  <text x="580" y="577" text-anchor="middle" fill="#9ca3af" font-size="10">Telemetry → Earth (7 min delay)</text>
  <text x="580" y="592" text-anchor="middle" fill="#6b7280" font-size="9">sensor state · risk score · decision · reason · position</text>

</svg>
